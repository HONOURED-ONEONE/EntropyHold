steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/honeypot-matrix-bot:$COMMIT_SHA', './matrix_bot']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/honeypot-matrix-bot:$COMMIT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'honeypot-matrix-bot'
      - '--image'
      - 'gcr.io/$PROJECT_ID/honeypot-matrix-bot:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--no-allow-unauthenticated'
      - '--min-instances'
      - '1'
      - '--set-env-vars'
      - 'MATRIX_HOMESERVER_URL=$_MATRIX_HOMESERVER_URL,MATRIX_ROOM_ID=$_MATRIX_ROOM_ID,HONEYPOT_BASE_URL=$_HONEYPOT_BASE_URL'
      - '--set-secrets'
      - 'MATRIX_ACCESS_TOKEN=matrix-access-token:latest,HONEYPOT_API_KEY=honeypot-api-key:latest'
