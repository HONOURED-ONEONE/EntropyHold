substitutions:
  _REGION: "asia-south1"
  _SERVICE: "honeypot-rq-collector"

steps:
  # Build the collector image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t", "gcr.io/$PROJECT_ID/${_SERVICE}:$COMMIT_SHA",
        "collector/"
      ]

  # Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/${_SERVICE}:$COMMIT_SHA"]

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "gcloud"
    args:
      [
        "run", "deploy", "${_SERVICE}",
        "--image", "gcr.io/$PROJECT_ID/${_SERVICE}:$COMMIT_SHA",
        "--region", "${_REGION}",
        "--platform", "managed",
        "--min-instances", "1",
        "--max-instances", "5",
        "--cpu", "1",
        "--memory", "512Mi",
        "--set-env-vars", "FINAL_LIST=callbacks:final,DLQ_LIST=callback:dlq",
        "--set-secrets", "REDIS_URL=REDIS_URL:latest,PG_DSN=PG_DSN:latest",
        "--no-allow-unauthenticated"
      ]

images:
  - "gcr.io/$PROJECT_ID/${_SERVICE}:$COMMIT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY
